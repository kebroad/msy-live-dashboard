name: Fetch live viewers

on:
  schedule:
    # Every 5 minutes. Note: GitHub cron is best-effort and may run late or
    # skip runs during peak load. 5 minutes is the documented minimum interval.
    - cron: "*/5 * * * *"
  workflow_dispatch: {}

# Avoid overlapping runs stomping on each other when pushing.
concurrency:
  group: fetch-viewers
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch viewer count
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          VIDEO_ID: ${{ vars.VIDEO_ID || 'MH0_mPt-VXE' }}
        run: python scripts/fetch_viewers.py

      - name: Commit sample
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- data/viewers.csv; then
            echo "No changes to commit."
            exit 0
          fi
          git add data/viewers.csv
          git commit -m "data: viewer sample $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          # Pull with rebase in case another run pushed in the meantime.
          git pull --rebase --autostash origin "${GITHUB_REF_NAME}" || true
          git push origin "HEAD:${GITHUB_REF_NAME}"
