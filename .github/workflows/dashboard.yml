name: Fetch, build & deploy

on:
  schedule:
    # Every 5 minutes (GitHub's minimum). Cron is best-effort and may run late
    # or skip under load, so expect roughly-5-minute granularity.
    - cron: "*/5 * * * *"
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: write # commit the data sample
  pages: write # deploy to Pages
  id-token: write # required by deploy-pages

concurrency:
  group: dashboard
  cancel-in-progress: false

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    env:
      YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
      VIDEO_ID: ${{ vars.VIDEO_ID || 'MH0_mPt-VXE' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Skips on fork PRs where the secret is unavailable; build still runs.
      - name: Fetch viewer count
        if: ${{ env.YOUTUBE_API_KEY != '' }}
        run: python scripts/fetch_viewers.py

      - name: Commit sample
        if: ${{ env.YOUTUBE_API_KEY != '' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- data/viewers.csv; then
            echo "No data changes."
          else
            git add data/viewers.csv
            git commit -m "data: viewer sample $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git pull --rebase --autostash origin "${GITHUB_REF_NAME}" || true
            git push origin "HEAD:${GITHUB_REF_NAME}"
          fi

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Bake latest data into build
        run: |
          mkdir -p dist/data
          cp data/viewers.csv dist/data/viewers.csv

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          # Enable Pages and switch the source to GitHub Actions if it isn't already.
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy
        id: deploy
        uses: actions/deploy-pages@v4
